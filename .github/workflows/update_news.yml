name: Daily News Update - 營業秘密新聞抓取

on:
  schedule:
    # 22:30 UTC = 06:30 AM Taiwan time (UTC+8)
    - cron: '30 22 * * *'
  workflow_dispatch: # 允許手動觸發

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news
        run: python3 fetch_news.py

      - name: Rebuild dashboard with fresh news
        run: python3 build_dashboard.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet news.json dashboard.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push news
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Trade Secret Bot"
          git config user.email "bot@trade-secret-dashboard.dev"
          git add news.json dashboard.html
          git commit -m "news: 每日營業秘密新聞更新 $(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M')"
          git push
