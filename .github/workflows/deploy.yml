name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install

      - name: Re-generate damages analysis
        run: |
          if [ -f trade_secret_judgments_fulltext.json ] && [ -f trade_secret_judgments_structured.json ]; then
            python3 extract_damages.py
          else
            echo "Skipping damages extraction — fulltext/structured JSON not present in repo."
          fi

      - name: Copy data to public
        run: mkdir -p public/data && cp -r data/* public/data/

      - name: Build
        run: npm run build

      - name: Copy data to dist
        run: cp -r data/* dist/data/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
